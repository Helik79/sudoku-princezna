<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohádkové Sudoku 4x4 pro princezny</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffd1dc;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.5) 15%, transparent 16%),
                radial-gradient(rgba(255, 255, 255, 0.3) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #ffffff;
            text-shadow: 3px 3px 0px #d81b60, 5px 5px 0px rgba(0,0,0,0.15);
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-align: center;
        }

        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.2);
            border: 2px solid #ffb74d;
        }

        button {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #c2185b;
        }

        button:hover {
            background-color: #ff4081;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #check-btn {
            background-color: #8e24aa;
            box-shadow: 0 4px 0 #6a1b9a;
        }
        #check-btn:hover { background-color: #ab47bc; }

        #timer {
            font-size: 20px;
            font-weight: bold;
            color: #e91e63;
            min-width: 80px;
            text-align: center;
        }

        #game-container {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.15);
            border: 4px solid #ffb74d;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            grid-template-rows: repeat(4, 85px);
            gap: 8px;
            background-color: #f8bbd0;
            padding: 8px;
            border-radius: 15px;
        }

        .cell {
            background-color: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            padding: 8px;
            box-sizing: border-box;
            border: 2px solid #f48fb1;
            transition: background-color 0.2s;
        }

        .cell:hover:not(.fixed) {
            background-color: #fff0f5;
        }

        .cell img, .palette-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cell.fixed {
            background-color: #f1f1f1;
            border-color: #cfd8dc;
            cursor: not-allowed;
        }

        #palette {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .palette-item {
            width: 85px;
            height: 85px;
            background-color: #fff;
            border: 3px solid #e91e63;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            overflow: hidden;
            padding: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .palette-item:hover {
            transform: scale(1.05);
            background-color: #fce4ec;
        }

        .palette-item.selected {
            background-color: #f8bbd0;
            border-color: #d81b60;
        }
        
        .palette-item.eraser {
            font-size: 13px;
            font-weight: bold;
            background-color: #ffe0b2;
            border-color: #f57c00;
            color: #e65100;
            text-align: center;
            height: 50px;
        }

        #msg {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 4px rgba(136, 14, 79, 0.6);
            height: auto;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <h1>✨ Kouzelné Sudoku pro Princezny 👑</h1>

    <div id="controls">
        <button id="start-btn" onclick="startGame()">▶ Hrát / Reset</button>
        <div id="timer">Čas: 00:00</div>
        <button id="check-btn" onclick="checkSolution()" style="display:none;">👁 Zkontrolovat</button>
    </div>

    <div id="game-container" style="display: none;">
        <div id="grid"></div>
        <div id="palette"></div>
    </div>

    <div id="msg">Klikni na tlačítko Hrát a poskládej kouzelné předměty do komnat!</div>

    <script>
       const symbols = {
    0: "",
    1: "C:\\Users\\Helena Jarkovská\\Downloads\\princezna\\snowhite.png",
    2: "C:\\Users\\Helena Jarkovská\\Downloads\\princezna\\tiana.png",
    3: "C:\\Users\\Helena Jarkovská\\Downloads\\princezna\\popelka.png",
    4: "https://github.com/Helik79/sudoku-princezna/blob/main/ariel.png",

 };
        const levels = [
            {
                solution: [[1,2,3,4],[3,4,1,2],[2,1,4,3],[4,3,2,1]],
                start:    [[1,0,3,0],[3,0,0,2],[0,1,4,0],[4,0,2,1]]
            },
            {
                solution: [[4,3,2,1],[1,2,3,4],[3,4,1,2],[2,1,4,3]],
                start:    [[4,3,0,1],[0,2,3,0],[3,0,1,0],[2,1,0,3]]
            },
            {
                solution: [[2,4,1,3],[1,3,2,4],[4,2,3,1],[3,1,4,2]],
                start:    [[2,0,1,3],[0,3,2,0],[4,2,0,0],[0,1,4,2]]
            },
            {
                solution: [[3,1,4,2],[4,2,3,1],[1,3,2,4],[2,4,1,3]],
                start:    [[3,1,0,0],[0,2,3,1],[1,3,2,0],[0,0,1,3]]
            },
            {
                solution: [[1,4,2,3],[2,3,1,4],[4,1,3,2],[3,2,4,1]],
                start:    [[0,4,2,3],[2,0,1,0],[4,1,0,2],[3,2,4,0]]
            },
            {
                solution: [[4,1,3,2],[2,3,4,1],[1,4,2,3],[3,2,1,4]],
                start:    [[4,0,3,2],[2,3,0,0],[0,4,2,3],[3,2,0,4]]
            },
            {
                solution: [[2,3,4,1],[4,1,2,3],[1,4,3,2],[3,2,1,4]],
                start:    [[2,0,4,1],[4,1,0,0],[0,4,3,2],[3,2,0,4]]
            },
            {
                solution: [[3,4,2,1],[1,2,4,3],[4,3,1,2],[2,1,3,4]],
                start:    [[3,4,0,1],[1,0,4,0],[0,3,1,2],[2,0,3,4]]
            },
            {
                solution: [[1,3,2,4],[4,2,1,3],[2,4,3,1],[3,1,4,2]],
                start:    [[1,3,0,4],[4,0,1,3],[2,4,0,0],[0,1,4,2]]
            },
            {
                solution: [[4,2,1,3],[3,1,4,2],[1,3,2,4],[2,4,3,1]],
                start:    [[4,2,1,0],[3,0,4,2],[1,3,2,0],[0,4,3,1]]
            }
        ];

        let currentLevelIndex = 0;
        let board = [];
        let fixedCells = [];
        let selectedSymbol = null;
        let timerInterval = null;
        let seconds = 0;
        let gameActive = false;

        function initPalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            
            for (let i = 1; i <= 4; i++) {
                const item = document.createElement('div');
                item.classList.add('palette-item');
                item.setAttribute('id', `palette-${i}`);
                item.onclick = () => selectPalette(i);
                
                const img = document.createElement('img');
                img.src = symbols[i];
                img.alt = `Předmět ${i}`;
                
                item.appendChild(img);
                palette.appendChild(item);
            }
            
            const eraser = document.createElement('div');
            eraser.classList.add('palette-item', 'eraser');
            eraser.setAttribute('id', 'palette-0');
            eraser.innerText = "✨ Smazat";
            eraser.onclick = () => selectPalette(0);
            palette.appendChild(eraser);
        }

        function startGame() {
            gameActive = true;
            seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "Čas: 00:00";
            
            timerInterval = setInterval(() => {
                seconds++;
                let min = Math.floor(seconds / 60).toString().padStart(2, '0');
                let sec = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `Čas: ${min}:${sec}`;
            }, 1000);

            let level = levels[currentLevelIndex];
            board = JSON.parse(JSON.stringify(level.start));
            fixedCells = level.start.map(row => row.map(cell => cell !== 0));

            renderBoard();
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('check-btn').style.display = 'inline-block';
            document.getElementById('msg').innerText = `✨ Královský úkol ${currentLevelIndex + 1} z 10 začíná!`;
            selectPalette(1);
        }

        function renderBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (fixedCells[r][c]) {
                        cell.classList.add('fixed');
                    }
                    
                    if (board[r][c] !== 0) {
                        const img = document.createElement('img');
                        img.src = symbols[board[r][c]];
                        cell.appendChild(img);
                    }
                    
                    cell.onclick = () => cellClick(r, c);
                    grid.appendChild(cell);
                }
            }
        }

        function selectPalette(symbolNum) {
            if (!gameActive) return;
            selectedSymbol = symbolNum;
            
            for (let i = 0; i <= 4; i++) {
                const item = document.getElementById(`palette-${i}`);
                if (item) {
                    if (i === symbolNum) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                }
            }
        }

        function cellClick(r, c) {
            if (!gameActive || fixedCells[r][c] || selectedSymbol === null) return;
            board[r][c] = selectedSymbol;
            renderBoard();
        }

        function checkSolution() {
            if (!gameActive) return;

            let level = levels[currentLevelIndex];
            let correct = true;

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] !== level.solution[r][c]) {
                        correct = false;
                        break;
                    }
                }
            }

            if (correct) {
                clearInterval(timerInterval);
                
                if (currentLevelIndex === levels.length - 1) {
                    gameActive = false;
                    document.getElementById('msg').innerText = "👑 VELKOLEPÉ VÍTĚZSTVÍ! Zachránila jsi celé pohádkové království a vyřešila všech 10 záhad! 🏰✨💖";
                    document.getElementById('check-btn').style.display = 'none';
                } else {
                    document.getElementById('msg').innerText = `🌸 Úžasné! Komnaty v paláci ${currentLevelIndex + 1} jsou správně uspořádané. Přesouváme se do dalšího zámku!`;
                    
                    setTimeout(() => {
                        currentLevelIndex++;
                        startGame();
                    }, 2500);
                }
            } else {
                document.getElementById('msg').innerText = "🌸 Ach ne, kouzelné předměty jsou popletené. Zkontroluj řádky, sloupce a čtverečky!";
            }
        }

        initPalette();
    </script>
</body>
</html>
